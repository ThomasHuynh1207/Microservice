server:
  port: 8761

spring:
  application:
    name: eureka-service  # Tên này để các service khác gọi

eureka:
  client:
    register-with-eureka: false    # ✅ ĐỔI thành false
    fetch-registry: false          # ✅ ĐỔI thành false
    service-url:
      defaultZone: http://localhost:8761/eureka/   # ✅ Dùng localhost cho chính nó
  instance:
    prefer-ip-address: true
    hostname: localhost
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30