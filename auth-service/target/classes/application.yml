server:
  port: 8081

spring:
  application:
    name: auth-service

  # ====================== Database Configuration ======================
  datasource:
    url: jdbc:postgresql://postgres:5432/authdb
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:Tuan}
    password: ${POSTGRES_PASSWORD:123456789}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Profile cho Docker
  profiles:
    active: docker

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ====================== Eureka Configuration (Quan trọng nhất) ======================
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-service:8761/eureka/

  instance:
    prefer-ip-address: true
    hostname: auth-service
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ====================== JWT Configuration ======================
jwt:
  secret: ${JWT_SECRET:TXlTdXBlclNlY3JldEtleU15U3VwZXJTZWNyZXRLZXk=}
  expiration: 86400000   # 24 giờ

# ====================== Logging (dễ debug) ======================
logging:
  level:
    org.springframework.cloud.netflix.eureka: DEBUG
    org.springframework.security: DEBUG