services:
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    networks:
      - runswim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      POSTGRES_DB: ${POSTGRES_DB:-runswim_app}
    ports:
      - "5432:5432"
    volumes:
      - runswim_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - runswim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runswim} -d ${POSTGRES_DB:-runswim_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: authdb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      JWT_SECRET: ${JWT_SECRET:-UnVuU3dpbUNsdWJTZWNyZXRKSVdUS2V5Rm9yRGV2}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  athlete-service:
    build: ./athlete-service
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: athletedb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  activity-service:
    build: ./activity-service
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: activitydb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  nutrition-service:
    build: ./nutrition-service
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: nutritiondb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: aidb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_started
      athlete-service:
        condition: service_started
      activity-service:
        condition: service_started
      nutrition-service:
        condition: service_started
      ai-service:
        condition: service_started
    environment:
      JWT_SECRET: ${JWT_SECRET:-UnVuU3dpbUNsdWJTZWNyZXRKSVdUS2V5Rm9yRGV2}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - runswim-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@runswim.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - runswim-network
    restart: unless-stopped

volumes:
  runswim_postgres_data:

networks:
  runswim-network:
    driver: bridge
