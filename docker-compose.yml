services:
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    networks:
      - runswim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      POSTGRES_DB: ${POSTGRES_DB:-runswim_app}
    ports:
      - "5432:5432"
    volumes:
      - runswim_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - runswim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runswim} -d ${POSTGRES_DB:-runswim_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  n8n-db-init:
    image: postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      PGPASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      N8N_DB_NAME: ${N8N_DB_NAME:-n8ndb}
    entrypoint:
      - /bin/sh
      - -ec
      - >
        psql -h postgres -U "$POSTGRES_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$N8N_DB_NAME'" | grep -q 1
        || createdb -h postgres -U "$POSTGRES_USER" "$N8N_DB_NAME"
    networks:
      - runswim-network
    restart: "no"

  n8n-import:
    image: docker.n8n.io/n8nio/n8n:latest
    depends_on:
      postgres:
        condition: service_healthy
      n8n-db-init:
        condition: service_completed_successfully
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8ndb}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-runswim}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - runswim_n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    networks:
      - runswim-network
    entrypoint:
      - /bin/sh
      - -ec
      - |
        n8n import:workflow --input=/workflows/ai-fitness.json || true
        n8n update:workflow --id=ai-fitness --active=true || true
    restart: "no"

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8ndb}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-runswim}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: http://n8n:5678/
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678/}
      
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - runswim_n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    networks:
      - runswim-network
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: authdb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      JWT_SECRET: ${JWT_SECRET:-UnVuU3dpbUNsdWJTZWNyZXRKSVdUS2V5Rm9yRGV2}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-Af84JEJZj_Q5Mwm9ieYCdTWevRUlheQq5vz6actbXVduCP8UnDgVhwOuVeH7PaAvGptpDCVOx1nrqrqC}
      PAYPAL_SECRET: ${PAYPAL_SECRET:-EH0VGwuej4ilTph909gNOQViKoVUZ_ncg1aqnkjzLQBgialC8O38e0vOo09YCTF0G7e7UpOhtLKzJF0Z}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  athlete-service:
    build: ./athlete-service
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: athletedb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  activity-service:
    build: ./activity-service
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: activitydb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  nutrition-service:
    build: ./nutrition-service
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: nutritiondb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_NAME: aidb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      AI_PROVIDER: ${AI_PROVIDER:-n8n}
      N8N_AI_WEBHOOK_URL: ${N8N_AI_WEBHOOK_URL:-http://n8n:5678/webhook/ai-fitness}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    ports:
      - "8089:8089"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: notificationdb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  payment-service:
    build: ./payment-service
    ports:
      - "8088:8088"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_NAME: paymentdb
      POSTGRES_USER: ${POSTGRES_USER:-runswim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runswim123}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-Af84JEJZj_Q5Mwm9ieYCdTWevRUlheQq5vz6actbXVduCP8UnDgVhwOuVeH7PaAvGptpDCVOx1nrqrqC}
      PAYPAL_SECRET: ${PAYPAL_SECRET:-EH0VGwuej4ilTph909gNOQViKoVUZ_ncg1aqnkjzLQBgialC8O38e0vOo09YCTF0G7e7UpOhtLKzJF0Z}
      AUTH_SERVICE_URL: http://auth-service:8081
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_started
      athlete-service:
        condition: service_started
      activity-service:
        condition: service_started
      nutrition-service:
        condition: service_started
      ai-service:
        condition: service_started
      notification-service:
        condition: service_started
      payment-service:
        condition: service_started
    environment:
      JWT_SECRET: ${JWT_SECRET:-UnVuU3dpbUNsdWJTZWNyZXRKSVdUS2V5Rm9yRGV2}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - runswim-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - runswim-network
    restart: unless-stopped

  admin-frontend:
    build: ./admin-frontend
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
    networks:
      - runswim-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@runswim.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - runswim-network
    restart: unless-stopped

volumes:
  runswim_postgres_data:
  runswim_n8n_data:

networks:
  runswim-network:
    driver: bridge
