server:
  port: 8086

spring:
  application:
    name: nutrition-service
  datasource:
    url: jdbc:postgresql://postgres:5432/fitness_app
    username: ${POSTGRES_USER:Tuan}
    password: ${POSTGRES_PASSWORD:123456789}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
