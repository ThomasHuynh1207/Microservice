server:
  port: 8085

spring:
  application:
    name: ai-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aidb}
    username: ${POSTGRES_USER:runswim}
    password: ${POSTGRES_PASSWORD:runswim123}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

app:
  ai:
    provider: ${AI_PROVIDER:local}
    n8n-webhook-url: ${N8N_AI_WEBHOOK_URL:http://localhost:5678/webhook/ai-fitness}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-2.5-flash}
