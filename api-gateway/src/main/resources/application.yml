server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - JwtAuthenticationFilter
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthenticationFilter
        - id: workout-service
          uri: http://workout-service:8083
          predicates:
            - Path=/api/workouts/**
          filters:
            - JwtAuthenticationFilter
        - id: progress-service
          uri: http://progress-service:8084
          predicates:
            - Path=/api/progress/**
          filters:
            - JwtAuthenticationFilter
        - id: ai-service
          uri: http://ai-service:8085
          predicates:
            - Path=/api/ai/**
          filters:
            - JwtAuthenticationFilter

