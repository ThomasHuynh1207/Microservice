server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service-admin
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/admin/**
          filters:
            - JwtAuthenticationFilter
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: athlete-service
          uri: lb://athlete-service
          predicates:
            - Path=/api/athletes/**
          filters:
            - JwtAuthenticationFilter
        - id: activity-service
          uri: lb://activity-service
          predicates:
            - Path=/api/activities/**
          filters:
            - JwtAuthenticationFilter
        - id: nutrition-service
          uri: lb://nutrition-service
          predicates:
            - Path=/api/nutrition/**
          filters:
            - JwtAuthenticationFilter
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - JwtAuthenticationFilter
        - id: community-service
          uri: lb://community-service
          predicates:
            - Path=/api/community/**
          filters:
            - JwtAuthenticationFilter
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuthenticationFilter
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            exposedHeaders: [Authorization, X-User-Id]
            allowCredentials: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: ${JWT_SECRET:UnVuU3dpbUNsdWJTZWNyZXRKSVdUS2V5Rm9yRGV2}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.tuan.apigateway: INFO
