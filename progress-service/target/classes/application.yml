server:
  port: 8084

spring:
  application:
    name: progress-service
  datasource:
    url: jdbc:h2:mem:progressdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

services:
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8085}
